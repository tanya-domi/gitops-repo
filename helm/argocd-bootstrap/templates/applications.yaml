{{- range .Values.services }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ . }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: {{ . }}
    repoURL: {{ $.Values.spec.source.repoURL }}
    targetRevision: {{ $.Values.spec.source.targetRevision }}
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/tanya-domi/gitops-repo/main/helm/online-boutique-services/{{ . }}/values.yaml
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ $.Values.spec.destination.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
  syncOptions:
    - Validate=true
    - CreateNamespace=false
    - PrunePropagationPolicy=foreground
    - PruneLast=true

---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: {{ . }}-updater
  namespace: argocd
spec:
  updateMethod: argocd
  applicationRefs:
    - name: {{ . }}
      images:
        - alias: {{ . }}
          imageName: us-central1-docker.pkg.dev/project-6b691de7-de66-4961-b80/app-images/{{ . }}
          updateStrategy: newest-build
          helm:
            imageTag: image.tag
{{- end }}

# I installed the newest version (v1.1.1) of the ArgoCD Image Updater. In this version, the controller looks for a Custom Resource (CR) called ImageUpdater instead of just looking at the annotations on your Application.The older version of Image Updater only used annotations.