apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tanya-domi/gitops-repo.git
    path: argocd-bootstrap
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true