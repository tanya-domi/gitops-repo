{{- range .Values.services }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ . }}
  namespace: argocd
  annotations:
    # Image Updater logic (using the variables from your values.yaml)
    argocd-image-updater.argoproj.io/image-list: {{ . }}=us-central1-docker.pkg.dev/{{ $.Values.project_id }}/app-images/{{ . }}
    argocd-image-updater.argoproj.io/{{ . }}.update-strategy: newest-build
    argocd-image-updater.argoproj.io/{{ . }}.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: {{ $.Values.spec.source.repoURL }}
    chart: {{ . }}
    targetRevision: {{ $.Values.spec.source.targetRevision }}
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/tanya-domi/gitops-repo/main/helm/online-boutique-services/{{ . }}/values.yaml
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ $.Values.spec.destination.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
{{- end }}
# I installed the newest version (v1.1.1) of the ArgoCD Image Updater. In this version, the controller looks for a Custom Resource (CR) called ImageUpdater instead of just looking at the annotations on your Application.The older version of Image Updater only used annotations.