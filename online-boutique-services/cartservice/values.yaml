deploymentName: cartservice-deployment

env:
  cartservice: true
  redis: true

serviceName: cartservice

appLabel: cartservice
appName: cartservice
jobLabel: cartservice

replicaCount: 1

image:
  repository: ghcr.io/tanya-domi/cartservice
  tag: "22160114288"
  pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: my-registry-key

terminationGracePeriodSeconds: 5

annotations:
  instrumentation.opentelemetry.io/inject-dotnet: "true"

containers:
  - name: server
    ports:
      - containerPort: 7070
    env:
      - name: OTEL_SERVICE_NAME
        value: "cartservice"

    readinessProbe:
      initialDelaySeconds: 20
      grpc:
        port: 7070

    livenessProbe:
      initialDelaySeconds: 25
      periodSeconds: 15
      grpc:
        port: 7070

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 7070
  targetPort: 7070

serviceAccount:
  create: true
  name: cartservice
