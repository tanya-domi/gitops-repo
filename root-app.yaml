apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tanya-domi/gitops-repo.git
    targetRevision: main
    path: helm/argocd-bootstrap # Path to your bootstrap chart
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true