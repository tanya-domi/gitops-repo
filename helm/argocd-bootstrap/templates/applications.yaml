{{- range $name, $config := .Values.services }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: {{ $name }}=us-central1-docker.pkg.dev/project-6b691de7-de66-4961-b80/boutique-repo/{{ $name }}
    argocd-image-updater.argoproj.io/{{ $name }}.update-strategy: semver
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/{{ $name }}.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/{{ $name }}.helm.image-tag: image.tag
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    repoURL: us-central1-docker.pkg.dev/project-6b691de7-de66-4961-b80/helm-charts
    chart: {{ $name }}
    targetRevision: {{ $config.version | default "0.1.1" }}
    helm:
      valueFiles:
        - {{ $.Values.repoURL }}/online-boutique-app/env/{{ $.Values.env }}.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Values.namespace | default "online-boutique" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
---
{{- end }}