{{- range .Values.services }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ . }}
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/image-list: {{ . }}=us-central1-docker.pkg.dev/{{ $.Values.project_id }}/app-images/{{ . }}
    argocd-image-updater.argoproj.io/{{ . }}.update-strategy: newest-build
    argocd-image-updater.argoproj.io/{{ . }}.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: {{ $.Values.spec.source.repoURL }}
    targetRevision: {{ $.Values.spec.source.targetRevision }}
    # Path 
    path: {{ if eq . "online-boutique-app" }}helm/online-boutique-app{{ else }}helm/online-boutique-services/{{ . }}{{ end }}
    helm:
      valueFiles:
        {{- if eq . "online-boutique-app" }}
        - "env/{{ $.Values.env }}.yaml"
        {{- else }}
        - "../../online-boutique-app/env/{{ $.Values.env }}.yaml"
        {{- end }}
        - "values.yaml"
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ $.Values.spec.destination.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
{{- end }}