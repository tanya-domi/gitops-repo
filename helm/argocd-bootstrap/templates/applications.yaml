{{- range $name, $config := .Values.services }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Your OCI Registry for the actual charts
    repoURL: us-central1-docker.pkg.dev/project-6b691de7-de66-4961-b80/helm-charts
    chart: {{ $name }}
    targetRevision: {{ $config.version | default "0.1.1" }}
    helm:
      valueFiles:
        # This points to /helm/online-boutique-app/env/dev.yaml
        - {{ $.Values.repoURL }}/online-boutique-app/env/{{ $.Values.env }}.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Values.namespace | default "online-boutique" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
{{- end }}